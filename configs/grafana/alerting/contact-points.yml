apiVersion: 1

# Multi-channel contact points for the data-flywheel MLOps platform.
#
# Every integration's credentials come from environment variables substituted
# by Grafana at provisioning time. IMPORTANT: Grafana's provisioning validator
# rejects empty ``addresses`` / ``url`` / ``integrationKey`` at contact-point
# save time, and because ``default-multi`` stacks three receivers in a single
# contact point, one failing receiver can invalidate the entire contact point
# at startup — dropping *all* notifications. To prevent that, ``.env.example``
# ships safe sentinel values (e.g. ``https://hooks.slack.invalid/disabled``)
# so every integration is syntactically valid. Sentinels cause per-receiver
# delivery failures at fire time, which Grafana isolates per receiver, so an
# operator who only configures one real channel still gets alerts on that
# channel; the other receivers log send failures and the fan-out continues.
#
# Policies (notification-policies.yml) route alerts to these contact points
# using the ``severity`` label produced by alerts.yml.

contactPoints:
  # Default multi-channel fan-out: used for all alerts regardless of severity.
  # Email + Slack + generic webhook deliver in parallel.
  - orgId: 1
    name: default-multi
    receivers:
      - uid: default-email
        type: email
        disableResolveMessage: false
        settings:
          addresses: ${GRAFANA_ALERT_EMAIL_ADDRESSES}
          singleEmail: false
      - uid: default-slack
        type: slack
        disableResolveMessage: false
        settings:
          url: ${GRAFANA_SLACK_WEBHOOK_URL}
          title: "[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}"
          text: |
            *Severity*: {{ .CommonLabels.severity }}
            {{ range .Alerts }}
            *Summary*: {{ .Annotations.summary }}
            *Description*: {{ .Annotations.description }}
            {{ end }}
      - uid: default-webhook
        type: webhook
        disableResolveMessage: false
        settings:
          url: ${GRAFANA_GENERIC_WEBHOOK_URL}
          httpMethod: POST

  # Critical escalation: PagerDuty + a dedicated high-visibility Slack message.
  # Matched only by alerts carrying ``severity = critical``; notification
  # policy uses ``continue: true`` so these alerts *also* fan out through
  # default-multi (email/slack/webhook) for audit trail.
  - orgId: 1
    name: critical-escalation
    receivers:
      - uid: critical-pagerduty
        type: pagerduty
        disableResolveMessage: false
        settings:
          integrationKey: ${GRAFANA_PAGERDUTY_INTEGRATION_KEY}
          severity: critical
          class: mlops
          component: data-flywheel
          group: platform
      - uid: critical-slack
        type: slack
        disableResolveMessage: false
        settings:
          url: ${GRAFANA_SLACK_WEBHOOK_URL}
          title: "CRITICAL: {{ .CommonLabels.alertname }}"
          text: |
            *Severity*: critical — escalated
            {{ range .Alerts }}
            *Summary*: {{ .Annotations.summary }}
            *Description*: {{ .Annotations.description }}
            {{ end }}
