# Development overrides - auto-loaded by docker compose.
# GPU support will be enabled here in Phase 3 (training) and Phase 5 (serving).
#
# Example GPU-enabled service pattern:
#
# services:
#   training:
#     deploy:
#       resources:
#         reservations:
#           devices:
#             - driver: nvidia
#               count: all
#               capabilities: [gpu]
services:
  label-studio:
    environment:
      LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED: "true"
      LABEL_STUDIO_LOCAL_FILES_DOCUMENT_ROOT: /label-studio/data
