services:
  # ---------------------------------------------------------------------------
  # PostgreSQL - Metadata store for MLflow and Prefect
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16.6-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mlops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mlops_secret}
      POSTGRES_MULTIPLE_DATABASES: ${POSTGRES_MULTIPLE_DATABASES:-mlflow,prefect,labelstudio}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/create-multiple-databases.sh:/docker-entrypoint-initdb.d/create-multiple-databases.sh:ro
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mlops}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # PostgreSQL one-shot init — idempotently ensures every database in
  # POSTGRES_MULTIPLE_DATABASES exists, even on pre-existing volumes where
  # /docker-entrypoint-initdb.d/ scripts have already been skipped.
  # Dependent services (mlflow, prefect-server, label-studio) wait for
  # this service to complete successfully before starting.
  # ---------------------------------------------------------------------------
  postgres-init:
    image: postgres:16.6-alpine
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: ${POSTGRES_USER:-mlops}
      PGPASSWORD: ${POSTGRES_PASSWORD:-mlops_secret}
      POSTGRES_MULTIPLE_DATABASES: ${POSTGRES_MULTIPLE_DATABASES:-mlflow,prefect,labelstudio}
    volumes:
      - ./scripts/ensure_databases.sh:/ensure_databases.sh:ro
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/ensure_databases.sh"]
    restart: "no"

  # ---------------------------------------------------------------------------
  # MinIO - S3-compatible object storage
  # ---------------------------------------------------------------------------
  minio:
    build:
      context: .
      dockerfile: docker/minio/Dockerfile
    image: data-flywheel/minio:2025.09.07
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # MLflow - Experiment tracking and model registry
  # ---------------------------------------------------------------------------
  mlflow:
    build:
      context: ./docker/mlflow
    image: data-flywheel/mlflow:v3.10.1
    command: >
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://${POSTGRES_USER:-mlops}:${POSTGRES_PASSWORD:-mlops_secret}@postgres:5432/mlflow
      --default-artifact-root s3://mlflow-artifacts
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      # Allow Docker internal hostnames for API access (DNS rebinding protection)
      MLFLOW_SERVER_ALLOWED_HOSTS: "mlflow,mlflow:5000,localhost,localhost:*,127.0.0.1,127.0.0.1:*"
    ports:
      - "127.0.0.1:${MLFLOW_PORT:-5000}:5000"
    depends_on:
      postgres:
        condition: service_healthy
      postgres-init:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    networks:
      - backend
    # NOTE: /health only checks if the web server is running, not PostgreSQL/MinIO connectivity.
    # Use `make verify` for deeper infrastructure validation.
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Prefect Server - Workflow orchestration
  # ---------------------------------------------------------------------------
  prefect-server:
    image: prefecthq/prefect:3.6.23-python3.11
    command: prefect server start --host 0.0.0.0 --port 4200
    environment:
      # Requires asyncpg driver (included in prefecthq/prefect images with Python 3.11+)
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://${POSTGRES_USER:-mlops}:${POSTGRES_PASSWORD:-mlops_secret}@postgres:5432/prefect
      PREFECT_SERVER_API_HOST: 0.0.0.0
      PREFECT_SERVER_API_PORT: "4200"
    ports:
      - "127.0.0.1:${PREFECT_PORT:-4200}:4200"
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      postgres-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # MLflow one-shot seed — idempotently ensures a baseline ``cv-classifier``
  # model exists in the Model Registry so the serving API can load a model
  # on a fresh environment. The underlying script is a no-op when any
  # version is already registered, so running on every ``up`` is safe.
  # ---------------------------------------------------------------------------
  mlflow-init:
    build:
      context: .
      dockerfile: docker/mlflow-init/Dockerfile
    image: data-flywheel/mlflow-init:0.1.0
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      SEED_MODEL_NAME: ${SERVING_MODEL_NAME:-cv-classifier}
      SEED_NUM_CLASSES: "10"
      SEED_ARCH: mobilenet_v3_small
    networks:
      - backend
    depends_on:
      mlflow:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: "no"

  # ---------------------------------------------------------------------------
  # Prefect worker — registers continuous-training, active-learning,
  # monitoring, and data-accumulation deployments on the Prefect server
  # via prefect.serve(...) and then listens for triggers. ``serve`` performs
  # an upsert, so restarting the container is idempotent.
  # ---------------------------------------------------------------------------
  prefect-worker:
    build:
      context: .
      dockerfile: docker/orchestration/Dockerfile
    image: data-flywheel/prefect-worker:0.2.0
    environment:
      PREFECT_API_URL: http://prefect-server:4200/api
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      TRAINING_REGISTERED_MODEL_NAME: ${SERVING_MODEL_NAME:-cv-classifier}
      # ContinuousTrainingConfig (CT_ prefix) — shared by CT, AL, and
      # data-accumulation deployments registered in serve_all.py.
      CT_S3_ENDPOINT: http://minio:9000
      CT_S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      CT_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      CT_MLFLOW_TRACKING_URI: http://mlflow:5000
      CT_LABEL_STUDIO_URL: http://label-studio:8080
      CT_LABEL_STUDIO_API_KEY: ${AL_LABEL_STUDIO_API_KEY:-}
      CT_LABEL_STUDIO_PROJECT_ID: ${AL_LABEL_STUDIO_PROJECT_ID:-1}
      CT_REGISTERED_MODEL_NAME: ${SERVING_MODEL_NAME:-cv-classifier}
      # DriftConfig (DRIFT_ prefix) — required for monitoring deployment.
      DRIFT_S3_ENDPOINT: http://minio:9000
      DRIFT_S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      DRIFT_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      DRIFT_PUSHGATEWAY_URL: http://pushgateway:9091
    networks:
      - backend
      - monitoring
    depends_on:
      prefect-server:
        condition: service_healthy
      mlflow-init:
        condition: service_completed_successfully
      pushgateway:
        condition: service_healthy
      label-studio:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis - In-memory data store (used by Prefect workers in Phase 4)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.4-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Inference API - FastAPI with Gunicorn/Uvicorn (Phase 5)
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: docker/serving/Dockerfile
    image: data-flywheel/api:0.1.0
    environment:
      SERVING_MODEL_NAME: ${SERVING_MODEL_NAME:-cv-classifier}
      SERVING_MODEL_VERSION: ${SERVING_MODEL_VERSION:-latest}
      SERVING_MLFLOW_TRACKING_URI: http://mlflow:5000
      SERVING_DEVICE: ${SERVING_DEVICE:-auto}
      SERVING_IMAGE_SIZE: ${SERVING_IMAGE_SIZE:-224}
      SERVING_CLASS_NAMES: ${SERVING_CLASS_NAMES:-}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      PREFECT_API_URL: http://prefect-server:4200/api
      ADMIN_API_KEY: ${ADMIN_API_KEY:-}
      PROMETHEUS_MULTIPROC_DIR: /tmp/prom_multiproc
    ports:
      - "127.0.0.1:${API_PORT:-8000}:8000"
    networks:
      - frontend
      - backend
    depends_on:
      mlflow:
        condition: service_healthy
      mlflow-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Inference API (Canary) - Challenger model for canary deployment (Phase C)
  # ---------------------------------------------------------------------------
  api-canary:
    build:
      context: .
      dockerfile: docker/serving/Dockerfile
    image: data-flywheel/api:0.1.0
    profiles: ["canary"]
    environment:
      SERVING_MODEL_NAME: ${SERVING_MODEL_NAME:-cv-classifier}
      SERVING_MODEL_VERSION: "@challenger"
      SERVING_MLFLOW_TRACKING_URI: http://mlflow:5000
      SERVING_DEVICE: ${SERVING_DEVICE:-auto}
      SERVING_IMAGE_SIZE: ${SERVING_IMAGE_SIZE:-224}
      SERVING_CLASS_NAMES: ${SERVING_CLASS_NAMES:-}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      GUNICORN_WORKERS: ${GUNICORN_CANARY_WORKERS:-1}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      PREFECT_API_URL: http://prefect-server:4200/api
      ADMIN_API_KEY: ${ADMIN_API_KEY:-}
      PROMETHEUS_MULTIPROC_DIR: /tmp/prom_multiproc
    networks:
      - frontend
      - backend
    depends_on:
      mlflow:
        condition: service_healthy
      mlflow-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Nginx - Reverse proxy for inference API (Phase 5)
  # ---------------------------------------------------------------------------
  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    image: data-flywheel/nginx:1.28.1-alpine
    ports:
      - "${NGINX_PORT:-80}:80"
    networks:
      - frontend
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/nginx/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Prometheus - Metrics collection (Phase 6)
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v3.10.0
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=5GB'
      # --web.enable-lifecycle removed: exposes unauthenticated reload/quit API
    volumes:
      - ./configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - monitoring
      - frontend
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Pushgateway - Receive batch metrics from Evidently (Phase 6)
  # ---------------------------------------------------------------------------
  pushgateway:
    image: prom/pushgateway:v1.11.0
    ports:
      - "127.0.0.1:${PUSHGATEWAY_PORT:-9091}:9091"
    networks:
      - monitoring
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9091/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Grafana - Metrics visualization (Phase 6)
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana-oss:12.4.1
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/mlops-overview.json
      # SMTP (email contact point) — leave GF_SMTP_ENABLED=false in on-prem
      # installs that do not have an outbound SMTP relay; other channels keep
      # firing independently.
      GF_SMTP_ENABLED: ${GRAFANA_SMTP_ENABLED:-false}
      GF_SMTP_HOST: ${GRAFANA_SMTP_HOST:-}
      GF_SMTP_USER: ${GRAFANA_SMTP_USER:-}
      GF_SMTP_PASSWORD: ${GRAFANA_SMTP_PASSWORD:-}
      GF_SMTP_FROM_ADDRESS: ${GRAFANA_SMTP_FROM_ADDRESS:-alerts@data-flywheel.local}
      GF_SMTP_FROM_NAME: ${GRAFANA_SMTP_FROM_NAME:-Data Flywheel Alerts}
      GF_SMTP_SKIP_VERIFY: ${GRAFANA_SMTP_SKIP_VERIFY:-false}
      # Custom variables consumed by configs/grafana/alerting/contact-points.yml
      # via Grafana's ${VAR} substitution at provisioning time. Defaults are
      # safe sentinels (RFC 2606 .invalid TLD / localhost / literal "disabled")
      # that keep the provisioning validator happy without delivering anywhere,
      # so a fresh ``docker compose up`` with no .env file still boots cleanly.
      GRAFANA_ALERT_EMAIL_ADDRESSES: ${GRAFANA_ALERT_EMAIL_ADDRESSES:-alerts@localhost}
      GRAFANA_SLACK_WEBHOOK_URL: ${GRAFANA_SLACK_WEBHOOK_URL:-https://hooks.slack.invalid/disabled}
      GRAFANA_GENERIC_WEBHOOK_URL: ${GRAFANA_GENERIC_WEBHOOK_URL:-https://webhook.invalid/disabled}
      GRAFANA_PAGERDUTY_INTEGRATION_KEY: ${GRAFANA_PAGERDUTY_INTEGRATION_KEY:-disabled}
    volumes:
      - ./configs/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./configs/grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./configs/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./configs/grafana/alerting:/etc/grafana/provisioning/alerting:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3000}:3000"
    networks:
      - monitoring
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Label Studio - Human-in-the-loop labeling (Active Learning Engine)
  # ---------------------------------------------------------------------------
  label-studio:
    image: heartexlabs/label-studio:1.19.0
    environment:
      DJANGO_DB: default
      POSTGRE_NAME: labelstudio
      POSTGRE_USER: ${POSTGRES_USER:-mlops}
      POSTGRE_PASSWORD: ${POSTGRES_PASSWORD:-mlops_secret}
      POSTGRE_HOST: postgres
      POSTGRE_PORT: "5432"
      # Local file serving disabled by default for security.
      # Enable in docker-compose.override.yml for development if needed.
      # LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED: "true"
      # LABEL_STUDIO_LOCAL_FILES_DOCUMENT_ROOT: /label-studio/data
    volumes:
      - label_studio_data:/label-studio/data
    ports:
      - "127.0.0.1:${LABEL_STUDIO_PORT:-8081}:8080"
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      postgres-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
  monitoring:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  redis_data:
  prometheus_data:
  grafana_data:
  label_studio_data:
