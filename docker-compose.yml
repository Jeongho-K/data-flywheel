services:
  # ---------------------------------------------------------------------------
  # PostgreSQL - Metadata store for MLflow and Prefect
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16.6-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mlops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mlops_secret}
      POSTGRES_MULTIPLE_DATABASES: ${POSTGRES_MULTIPLE_DATABASES:-mlflow,prefect}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/create-multiple-databases.sh:/docker-entrypoint-initdb.d/create-multiple-databases.sh:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mlops}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # MinIO - S3-compatible object storage
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # MinIO Init - One-shot bucket creator
  # ---------------------------------------------------------------------------
  minio-init:
    # mc client version must be compatible with minio server version above
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    entrypoint: /bin/sh
    command: >
      -c "
      for i in 1 2 3 4 5; do
        mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} && break
        echo 'Retrying mc alias set in 3s...' && sleep 3
      done &&
      mc mb --ignore-existing myminio/mlflow-artifacts &&
      mc mb --ignore-existing myminio/dvc-storage &&
      mc mb --ignore-existing myminio/model-registry &&
      mc mb --ignore-existing myminio/prediction-logs &&
      mc mb --ignore-existing myminio/drift-reports &&
      echo 'All buckets created successfully.'
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    depends_on:
      minio:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # MLflow - Experiment tracking and model registry
  # ---------------------------------------------------------------------------
  mlflow:
    build:
      context: ./docker/mlflow
    image: mlops-pipeline/mlflow:v3.10.1
    command: >
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://${POSTGRES_USER:-mlops}:${POSTGRES_PASSWORD:-mlops_secret}@postgres:5432/mlflow
      --default-artifact-root s3://mlflow-artifacts
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      # Allow Docker internal hostnames for API access (DNS rebinding protection)
      MLFLOW_SERVER_ALLOWED_HOSTS: "mlflow,mlflow:5000,localhost,localhost:*,127.0.0.1,127.0.0.1:*"
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    # NOTE: /health only checks if the web server is running, not PostgreSQL/MinIO connectivity.
    # Use `make verify` for deeper infrastructure validation.
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Prefect Server - Workflow orchestration
  # ---------------------------------------------------------------------------
  prefect-server:
    image: prefecthq/prefect:3.6.23-python3.11
    command: prefect server start --host 0.0.0.0 --port 4200
    environment:
      # Requires asyncpg driver (included in prefecthq/prefect images with Python 3.11+)
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://${POSTGRES_USER:-mlops}:${POSTGRES_PASSWORD:-mlops_secret}@postgres:5432/prefect
      PREFECT_SERVER_API_HOST: 0.0.0.0
      PREFECT_SERVER_API_PORT: "4200"
    ports:
      - "${PREFECT_PORT:-4200}:4200"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis - In-memory data store (used by Prefect workers in Phase 4)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.4-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Inference API - FastAPI with Gunicorn/Uvicorn (Phase 5)
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: docker/serving/Dockerfile
    image: mlops-pipeline/api:0.1.0
    environment:
      SERVING_MODEL_NAME: ${SERVING_MODEL_NAME:-cv-classifier}
      SERVING_MODEL_VERSION: ${SERVING_MODEL_VERSION:-latest}
      SERVING_MLFLOW_TRACKING_URI: http://mlflow:5000
      SERVING_DEVICE: ${SERVING_DEVICE:-auto}
      SERVING_IMAGE_SIZE: ${SERVING_IMAGE_SIZE:-224}
      SERVING_CLASS_NAMES: ${SERVING_CLASS_NAMES:-}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      mlflow:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Nginx - Reverse proxy for inference API (Phase 5)
  # ---------------------------------------------------------------------------
  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    image: mlops-pipeline/nginx:1.28.1-alpine
    ports:
      - "${NGINX_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/nginx/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Prometheus - Metrics collection (Phase 6)
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v3.10.0
    volumes:
      - ./configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Pushgateway - Receive batch metrics from Evidently (Phase 6)
  # ---------------------------------------------------------------------------
  pushgateway:
    image: prom/pushgateway:v1.11.0
    ports:
      - "${PUSHGATEWAY_PORT:-9091}:9091"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9091/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Grafana - Metrics visualization (Phase 6)
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana-oss:12.4.1
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/mlops-overview.json
    volumes:
      - ./configs/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./configs/grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./configs/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
  redis_data:
  prometheus_data:
  grafana_data:
