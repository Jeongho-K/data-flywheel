<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3.5 L0,7z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" rx="16" fill="white" stroke="#3b82f6" stroke-width="2.5"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">Monitoring Architecture — Real-time + Batch</text>

  <!-- ===== REAL-TIME PATH (green bg) ===== -->
  <rect x="20" y="42" width="510" height="72" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="32" y="57" font-size="8" font-weight="600" fill="#16a34a" letter-spacing="0.5">REAL-TIME PATH</text>

  <!-- FastAPI -->
  <rect x="32" y="62" width="120" height="44" rx="8" fill="white" stroke="#009688" stroke-width="1.3" filter="url(#shadow)"/>
  <g transform="translate(40.0,69.0) scale(0.8333,0.8333)">
    <path d="M12 .0387C5.3729.0384.0003 5.3931 0 11.9988c-.001 6.6066 5.372 11.9628 12 11.9625 6.628.0003 12.001-5.3559 12-11.9625-.0003-6.6057-5.3729-11.9604-12-11.96m-.829 5.4153h7.55l-7.5805 5.3284h5.1828L5.279 18.5436q2.9466-6.5444 5.892-13.0896" fill="#009688"/>
  </g>
  <text x="64" y="80" font-size="10" font-weight="700" fill="#0e7490">FastAPI</text>
  <text x="92" y="98" text-anchor="middle" font-size="7.5" fill="#64748b" font-style="italic">/metrics endpoint</text>

  <!-- Arrow: FastAPI → Prometheus -->
  <line x1="152" y1="84" x2="270" y2="84" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="211" y="77" text-anchor="middle" font-size="7.5" fill="#64748b">Scrape every 15s</text>

  <!-- ===== BATCH PATH (yellow bg) ===== -->
  <rect x="20" y="126" width="510" height="135" rx="10" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
  <text x="32" y="141" font-size="8" font-weight="600" fill="#ca8a04" letter-spacing="0.5">BATCH PATH</text>

  <!-- Evidently -->
  <rect x="32" y="154" width="120" height="50" rx="8" fill="white" stroke="#CE3C32" stroke-width="1.3" filter="url(#shadow)"/>
  <circle cx="52" cy="173" r="12" fill="#CE3C32"/>
  <text x="52" y="178" text-anchor="middle" font-size="13" font-weight="700" fill="white">E</text>
  <text x="72" y="173" font-size="10" font-weight="700" fill="#CE3C32">Evidently</text>
  <text x="92" y="193" text-anchor="middle" font-size="7.5" fill="#64748b" font-style="italic">Detect Drift</text>

  <!-- MinIO -->
  <rect x="32" y="218" width="120" height="44" rx="8" fill="white" stroke="#C72E49" stroke-width="1.3" filter="url(#shadow)"/>
  <g transform="translate(40.0,225.0) scale(0.8333,0.8333)">
    <path d="M13.2072.006c-.6216-.0478-1.2.1943-1.6211.582a2.15 2.15 0 0 0-.0938 3.0352l3.4082 3.5507a3.042 3.042 0 0 1-.664 4.6875l-.463.2383V7.2853a15.4198 15.4198 0 0 0-8.0174 10.4862v.0176l6.5487-3.3281v7.621L13.7794 24V13.6817l.8965-.4629a4.4432 4.4432 0 0 0 1.2207-7.0292l-3.371-3.5254a.7489.7489 0 0 1 .037-1.0547.7522.7522 0 0 1 1.0567.0371l.4668.4863z" fill="#C72E49"/>
  </g>
  <text x="64" y="237" font-size="10" font-weight="700" fill="#C72E49">MinIO</text>
  <text x="92" y="254" text-anchor="middle" font-size="7.5" fill="#64748b" font-style="italic">Object Storage</text>

  <!-- Arrow: MinIO → Evidently (Read Logs) -->
  <line x1="92" y1="218" x2="92" y2="209" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="120" y="216" font-size="7.5" fill="#64748b">Read Logs (S3)</text>

  <!-- Pushgateway -->
  <rect x="220" y="154" width="130" height="50" rx="8" fill="white" stroke="#94a3b8" stroke-width="1.3" filter="url(#shadow)"/>
  <text x="246" y="176" font-size="16">📮</text>
  <text x="266" y="176" font-size="10" font-weight="700" fill="#475569">Pushgateway</text>
  <text x="285" y="193" text-anchor="middle" font-size="7.5" fill="#64748b" font-style="italic">:9091</text>

  <!-- Arrow: Evidently → Pushgateway -->
  <line x1="152" y1="179" x2="215" y2="179" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="183" y="172" text-anchor="middle" font-size="7.5" fill="#64748b">Push Metrics</text>

  <!-- Arrow: Pushgateway → Prometheus -->
  <line x1="350" y1="170" x2="440" y2="130" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="405" y="141" text-anchor="middle" font-size="7.5" fill="#64748b">Scrape</text>

  <!-- ===== SHARED COMPONENTS (spanning both paths) ===== -->

  <!-- Prometheus (large, shared) -->
  <rect x="545" y="50" width="150" height="130" rx="12" fill="#fff7ed" stroke="#E6522C" stroke-width="1.8" filter="url(#shadow)"/>
  <g transform="translate(597.0,62.0) scale(1.1667,1.1667)">
    <path d="M12 0C5.373 0 0 5.372 0 12c0 6.627 5.373 12 12 12s12-5.373 12-12c0-6.628-5.373-12-12-12zm0 22.46c-1.885 0-3.414-1.26-3.414-2.814h6.828c0 1.553-1.528 2.813-3.414 2.813zm5.64-3.745H6.36v-2.046h11.28v2.046zm-.04-3.098H6.391c-.037-.043-.075-.086-.111-.13-1.155-1.401-1.427-2.133-1.69-2.879z" fill="#E6522C"/>
  </g>
  <text x="620" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#E6522C">Prometheus</text>
  <text x="620" y="124" text-anchor="middle" font-size="9" fill="#475569">:9090</text>
  <text x="620" y="140" text-anchor="middle" font-size="8" fill="#64748b" font-style="italic">Time-Series DB</text>
  <text x="620" y="155" text-anchor="middle" font-size="8" fill="#64748b" font-style="italic">Metrics Collector</text>

  <!-- Real-time arrow into Prometheus -->
  <line x1="530" y1="84" x2="540" y2="90" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- Grafana (large, shared) -->
  <rect x="730" y="50" width="145" height="130" rx="12" fill="#fef3e2" stroke="#F46800" stroke-width="1.8" filter="url(#shadow)"/>
  <!-- Grafana logo - using orange circle with G -->
  <circle cx="802" cy="78" r="14" fill="#F46800"/>
  <text x="802" y="84" text-anchor="middle" font-size="14" font-weight="700" fill="white">G</text>
  <text x="802" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#F46800">Grafana</text>
  <text x="802" y="126" text-anchor="middle" font-size="9" fill="#475569">:3000</text>
  <text x="802" y="142" text-anchor="middle" font-size="8" fill="#64748b" font-style="italic">Dashboard</text>

  <!-- Arrow: Prometheus → Grafana -->
  <line x1="695" y1="115" x2="725" y2="115" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="710" y="108" text-anchor="middle" font-size="7.5" fill="#64748b">Query</text>

  <!-- ===== GRAFANA OUTPUTS ===== -->

  <!-- Alerts -->
  <rect x="808" y="196" width="75" height="36" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="825" y="218" font-size="14">🔔</text>
  <text x="848" y="218" font-size="9" font-weight="600" fill="#dc2626">Alerts</text>

  <!-- Dashboards -->
  <rect x="808" y="240" width="75" height="36" rx="8" fill="#f0f9ff" stroke="#3b82f6" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="823" y="262" font-size="14">📊</text>
  <text x="848" y="262" font-size="8" font-weight="600" fill="#2563eb">Dashboards</text>

  <!-- Arrows: Grafana → outputs -->
  <line x1="840" y1="180" x2="845" y2="192" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="845" y1="232" x2="845" y2="237" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrow)"/>

</svg>
