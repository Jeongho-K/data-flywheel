  </g>
  <text x="230" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#334155">DVC</text>
  <text x="230" y="195" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#64748b">Version Data</text>

  <!-- Arrow 2→3 -->
  <line x1="275" y1="142" x2="305" y2="142" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box 3: CleanVision -->
