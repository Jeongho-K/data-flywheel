  <text x="350" y="143" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#6366f1">CV</text>
  <text x="350" y="158" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#334155">CleanVision</text>
  <text x="350" y="195" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#64748b">Validate Images</text>

  <!-- Arrow 3→4 -->
  <line x1="395" y1="142" x2="425" y2="142" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box 4: PyTorch -->
  <rect x="425" y="110" width="90" height="65" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
