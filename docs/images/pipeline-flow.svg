<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1100 220">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="220" fill="#ffffff" rx="16" stroke="#3b82f6" stroke-width="2.5"/>

  <!-- Title -->
  <text x="550" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#1e293b">Pipeline Flow — End-to-End</text>

  <!-- Prefect orchestrator dashed box (spans DVC through MLflow) -->
  <rect x="168" y="42" width="530" height="50" rx="8" fill="none" stroke="#070E10" stroke-width="1.5" stroke-dasharray="6 3"/>
  <g transform="translate(182.0,52.0) scale(0.9167,0.9167)">
    <path d="M12 8.003 4.288 4.002 12 0l7.713 4v8.004L12 16v8l-7.71-4v-8L12 16V8.003Z" fill="#070E10"/>
  </g>
  <text x="210" y="68" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#070E10">Prefect — Orchestrate</text>

  <!-- Vertical dashed lines from Prefect box down to controlled boxes -->
  <line x1="230" y1="92" x2="230" y2="110" stroke="#070E10" stroke-width="1" stroke-dasharray="4 2"/>
  <line x1="350" y1="92" x2="350" y2="110" stroke="#070E10" stroke-width="1" stroke-dasharray="4 2"/>
  <line x1="470" y1="92" x2="470" y2="110" stroke="#070E10" stroke-width="1" stroke-dasharray="4 2"/>
  <line x1="590" y1="92" x2="590" y2="110" stroke="#070E10" stroke-width="1" stroke-dasharray="4 2"/>

  <!-- === Main Flow Boxes === -->

  <!-- Box 1: Raw Data -->
  <rect x="55" y="110" width="90" height="65" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
  <text x="100" y="148" text-anchor="middle" font-size="22">&#128194;</text>
  <text x="100" y="163" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#334155">Raw Data</text>
  <text x="100" y="195" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#64748b">Ingest</text>

  <!-- Arrow 1→2 -->
  <line x1="145" y1="142" x2="185" y2="142" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box 2: DVC -->
  <rect x="185" y="110" width="90" height="65" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
  <g transform="translate(218.0,120.0) scale(1.0000,1.0000)">
